name: Trigger Releases
on:
  push:
    branches: main

jobs:
  check-changes:
    runs-on: ubuntu-latest
    name: Check Changed Files
    outputs:
      modules: ${{ steps.build-matrix.outputs.modules }}
    steps:
      - uses: actions/checkout@v6
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: packages/**/package.json
          separator: "\n"
      - name: Build matrix input
        id: build-matrix
        if: ${{ steps.changed-files.outputs.all_changed_files != '' }}
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          set +e
          modules_list=()
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            # tj-actions/changed-files@v47 with `separator: "\n"` writes the
            # paths to $GITHUB_OUTPUT as `path1\<NL>path2\<NL>...pathN`, i.e. a
            # literal backslash before each newline. Without this strip the
            # check below sees `packages/foo/package.json\` (with trailing
            # backslash), the file doesn't exist, and the package is dropped
            # from the release matrix. Only the last entry has no trailing
            # backslash, so previously only the last bumped package was
            # released when a PR bumped multiple packages.
            file="${file%\\}"
            ./bin/check-version-bump.sh ./"$file"

            # check-version-bump exits with 0 if it detects a bump, otherwise with 1
            if [ $? != "1" ] && [[ ! " ${modules_list[*]} " =~ " ${file} " ]]; then
              modules_list+=("${file%"/package.json"}")
            fi
          done <<< "$ALL_CHANGED_FILES"

          jsonString="$(jq --compact-output --null-input '$ARGS.positional' --args -- "${modules_list[@]}")"
          echo "modules=$jsonString" >> $GITHUB_OUTPUT

  trigger-lint:
    name: Run Lint Checks
    needs: [ check-changes ]
    if: ${{ needs.check-changes.outputs.modules != '' && toJson(fromJson(needs.check-changes.outputs.modules)) != '[]' }}
    uses: ./.github/workflows/lint.yml

  trigger-unit-tests:
    name: Run Unit Tests
    needs: [ check-changes ]
    if: ${{ needs.check-changes.outputs.modules != '' && toJson(fromJson(needs.check-changes.outputs.modules)) != '[]' }}
    uses: ./.github/workflows/unit-test.yml
    secrets: inherit

  trigger-releases:
    name: Trigger releases
    needs: [ check-changes, trigger-lint, trigger-unit-tests ]
    if: ${{ needs.check-changes.outputs.modules != '' && toJson(fromJson(needs.check-changes.outputs.modules)) != '[]' }}
    permissions: write-all
    strategy:
      matrix:
        module: ${{ fromJSON(needs.check-changes.outputs.modules) }}
    uses: ./.github/workflows/create-release.yml
    with:
        module: ${{ matrix.module }}
    secrets: inherit
