name: Check version bump and changelog files

on:
  workflow_call:

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    name: Enforce changelog files update
    steps:
      - uses: actions/checkout@v7
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: packages/**/package.json
          separator: "\n"
      - name: Build matrix input
        id: build-matrix
        if: ${{ steps.changed-files.outputs.all_changed_files != '' }}
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          set +e
          modules_list=()
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            # tj-actions/changed-files@v47 with `separator: "\n"` writes the
            # paths to $GITHUB_OUTPUT as `path1\<NL>path2\<NL>...pathN`, i.e. a
            # literal backslash before each newline. Without this strip the
            # check below sees `packages/foo/package.json\` (with trailing
            # backslash), the file doesn't exist, and the package is dropped
            # from the changelog check matrix. Only the last entry has no
            # trailing backslash, so previously only the last bumped package
            # was checked when a PR bumped multiple packages.
            file="${file%\\}"
            ./bin/check-version-bump.sh ./"$file"

            # check-version-bump exits with 0 if it detects a bump, otherwise with 1
            if [ $? != "1" ] && [[ ! " ${modules_list[*]} " =~ " ${file} " ]]; then
              version="$(jq -r '.version' "$file")"
              modules_list+=("{\"name\": \"${file%"/package.json"}\", \"version\": \"$version\"}")
            fi
          done <<< "$ALL_CHANGED_FILES"

          jsonString="$(jq --compact-output --null-input '$ARGS.positional' --jsonargs -- "${modules_list[@]}")"
          echo $jsonString
          echo "modules=$jsonString" >> $GITHUB_OUTPUT

      - name: Check changelog files
        if: ${{ steps.build-matrix.outputs.modules != '' }}
        env:
          MODULES: ${{ steps.build-matrix.outputs.modules }}
        run: |
          kotlinc -script .github/scripts/CheckChangelogs.main.kts "$MODULES"
