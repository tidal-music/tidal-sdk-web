name: Cypress Tests

# Paths: Cypress is only used in player pkg, so only run this workflow
# when something in player changes, or in true-time since that's a hard dep.defaults:
# (Auth is provided via credentials provider and not directly used)
on:
  push:
    branches: [ "main" ]
    paths:
      - packages/true-time/**
      - packages/player/**
  pull_request:
    branches: [ "main" ]
    paths:
      - packages/true-time/**
      - packages/player/**
  merge_group:
    types: [checks_requested]
    paths:
      - packages/true-time/**
      - packages/player/**

concurrency:
  group: cypress-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cypress-run:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Restore Cypress binary cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: ./.github/actions/setup
      - name: Ensure Cypress binary is installed
        working-directory: packages/player
        run: pnpm exec cypress install
      - name: Prepare test user for player tests
        id: json
        env:
          TEST_USER: ${{ secrets.PLAYER_TEST_USER }}
          PLAYER_REFRESH_TOKEN: ${{ secrets.PLAYER_REFRESH_TOKEN }}
        run: |
          printf '%s' "$TEST_USER" | base64 -d > test-user.json
          json=$(cat test-user.json)
          fixed_json="${json/\[TOKEN\]/$PLAYER_REFRESH_TOKEN}"
          encoded_json=$(printf '%s' "$fixed_json" | base64 | tr -d '\n')
          echo "encoded=\"$encoded_json\"" >> $GITHUB_OUTPUT
      - name: Cypress run
        uses: cypress-io/github-action@bc22e01685c56e89e7813fd8e26f33dc47f87e15 # v7.1.5
        env:
          CYPRESS_TEST_USER: ${{ steps.json.outputs.encoded }}
        with:
          install: false
          browser: chrome
          start: pnpm --dir packages/player/ dev
          wait-on: 'http://localhost:5173/demo/test-case-1.html'
          command: pnpm --dir packages/player/ internal:cypress:run
      - name: Save Cypress binary cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('pnpm-lock.yaml') }}
