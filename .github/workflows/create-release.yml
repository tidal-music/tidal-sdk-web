name: Create release

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string

jobs:
  expose-tag:
    name: Expose Tag
    runs-on: ubuntu-latest
    outputs:
      module-tag: ${{ steps.expose-tag.outputs.tag }}
      module-version: ${{ steps.expose-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Expose tag and version
        id: expose-tag
        env:
          MODULE: ${{ inputs.module }}
        run: |
          version="$(jq -r '.version' "$MODULE/package.json")"
          tag="$MODULE-$version"
          tag="${tag##*/}"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT

  create-release:
    runs-on: ubuntu-latest
    # needs: [ expose-tag,  run-lint,  run-unit-tests ]
    needs: expose-tag
    permissions: 
      contents: write
    env: 
      path: ${{ inputs.module }}
      version: ${{ needs.expose-tag.outputs.module-version}}
      tag: ${{ needs.expose-tag.outputs.module-tag}}
    steps:
    - uses: actions/checkout@v6
    - uses: ./.github/actions/setup
    - name: Extract changelog entry
      run: |
        if [ -f "${{ env.path }}/CHANGELOG.md" ]; then
          awk -v ver="${{ env.version }}" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) { found=1; getline; next } }
            found { print }
          ' "${{ env.path }}/CHANGELOG.md" > release-notes.md
        fi
        if [ ! -s release-notes.md ]; then
          echo "Release ${{ env.tag }}" > release-notes.md
        fi
    - name: Generate Release Draft
      id: generate-release
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        tag: ${{ env.tag }}  
        allowUpdates: true
        draft: true
        bodyFile: release-notes.md

    - name: Build And Upload Artifacts To Release
      uses: ./.github/actions/build-module
      with: 
        module-path: ${{ env.path }}
        version: ${{ env.version }}
        tag: ${{ env.tag }}
        token: ${{ github.token }}

